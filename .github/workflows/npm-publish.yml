name: Publish npm packages

on:
  push:
    tags:
      - 'cli-*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (skip husky)
        run: pnpm install --ignore-scripts

      - name: Build @zhangheteng/aag-core
        run: pnpm -F @zhangheteng/aag-core run build

      - name: Build @zhangheteng/aag-cli
        run: pnpm -F @zhangheteng/aag-cli run build

      - name: Publish @zhangheteng/aag-core
        run: node scripts/pre-publish.js packages/core "npm publish --access public --no-git-checks"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @zhangheteng/aag-cli
        run: node scripts/pre-publish.js packages/cli "npm publish --access public --no-git-checks"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
